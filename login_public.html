<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0c0f;
            --text: rgba(255, 255, 255, .92);
            --muted: rgba(255, 255, 255, .55);
            --line: rgba(255, 255, 255, .10);
            --panel: rgba(255, 255, 255, .03);
            --gold: rgba(255, 209, 102, .85);
            --gold-glow: rgba(255, 209, 102, .15);
            --radius: 24px;
            --shadow: 0 24px 80px rgba(0, 0, 0, .6);
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(800px 500px at 50% -5%, rgba(255, 209, 102, .06), transparent 55%),
                radial-gradient(600px 400px at 15% 85%, rgba(255, 255, 255, .03), transparent 60%),
                radial-gradient(500px 350px at 85% 90%, rgba(255, 209, 102, .03), transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500"><filter id="n"><feTurbulence baseFrequency="0.9" numOctaves="4"/></filter><rect width="500" height="500" filter="url(%23n)" opacity="0.025"/></svg>');
            pointer-events: none;
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 64px 52px 56px;
            max-width: 720px;
            width: 100%;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            text-align: center;
            overflow: hidden;
        }

        @media (max-width: 620px) {
            .login-container {
                padding: 34px 16px 30px;
                max-width: 100%;
            }

            h1 {
                font-size: 1.7em;
            }

            .subtitle {
                margin-bottom: 22px;
                font-size: 0.88em;
            }
        }

        .floats {
            font-size: 1.8em;
            letter-spacing: 0.15em;
            margin-bottom: 32px;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--gold);
            font-size: 2.1em;
            font-weight: 400;
            letter-spacing: 0.01em;
            line-height: 1.2;
            margin-bottom: 14px;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 44px;
            font-size: 0.93em;
            font-weight: 300;
            letter-spacing: 0.02em;
            line-height: 1.6;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .puzzle-wrap {
            margin: 0 auto;
            width: 100%;
            max-width: 420px;
        }

        .puzzle-board {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .04);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .03);
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        .puzzle-board.hidden {
            display: none;
        }

        .puzzle-complete {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 14px;
            border: 1px solid rgba(255, 209, 102, .35);
            background: url('/puzzle.png') center/cover no-repeat;
            box-shadow: 0 0 32px rgba(255, 209, 102, .12);
            animation: slideIn 0.5s ease;
            display: none;
        }

        .puzzle-complete.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .puzzle-board button {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-size: 0;
            line-height: 0;
            border: 0;
            appearance: none;
            -webkit-appearance: none;
            background-color: transparent;
        }

        .puzzle-tile {
            display: block;
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 8px;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease;
            touch-action: manipulation;
        }

        .puzzle-tile:hover {
            transform: scale(0.98);
            box-shadow: 0 0 0 1px rgba(255, 209, 102, .35);
        }

        .puzzle-empty {
            border-radius: 8px;
            background: rgba(255, 255, 255, .03);
            border: 1px dashed rgba(255, 255, 255, .15);
        }

        .puzzle-status {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.84em;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
            text-align: right;
        }

        .puzzle-status span {
            flex: 1 1 120px;
        }

        .puzzle-controls {
            margin-top: 12px;
            display: flex;
            justify-content: center;
        }

        .puzzle-reset {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .04);
            color: var(--muted);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 12px;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: all .2s ease;
        }

        .puzzle-reset:hover {
            border-color: rgba(255, 255, 255, .25);
            color: var(--text);
            transform: translateY(-1px);
            box-shadow: none;
            background: rgba(255, 255, 255, .08);
        }

        .open-btn {
            background: var(--gold-glow);
            color: var(--gold);
            border: 1px solid rgba(255, 209, 102, .22);
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.05em;
        }

        .open-btn:hover {
            background: rgba(255, 209, 102, .22);
            border-color: rgba(255, 209, 102, .40);
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(255, 209, 102, .12);
        }

        .open-btn:active {
            transform: translateY(0);
        }

        .open-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .note {
            margin-top: 32px;
            color: var(--muted);
            font-size: 0.82em;
            font-weight: 300;
            letter-spacing: 0.01em;
            line-height: 1.6;
        }

        .error-msg {
            background: rgba(255, 80, 80, .08);
            border: 1px solid rgba(255, 80, 80, .18);
            color: rgba(255, 130, 130, .9);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.88em;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="floats">✦ ✦ ✦ ✦ ✦</div>
        <h1>Just for You</h1>
        <p class="subtitle">Solve this 4x4 puzzle to unlock your birthday surprise.</p>
        <form action="/login" method="POST">
            <input type="hidden" name="redirect" value="index">
            <input type="hidden" id="puzzleSolvedInput" name="puzzle_solved" value="0">
            <div class="puzzle-wrap">
                <div id="puzzleBoard" class="puzzle-board" aria-label="Sliding puzzle"></div>
                <div id="puzzleComplete" class="puzzle-complete" aria-label="Completed puzzle"></div>
                <div class="puzzle-status">
                    <span id="movesCount">Moves: 0</span>
                </div>
                <div class="puzzle-controls">
                    <button type="button" class="puzzle-reset" id="shuffleBtn">Shuffle</button>
                </div>
            </div>
            <button type="submit" id="openBtn" class="open-btn" disabled>Unlock</button>
        </form>
        <p class="note">💛 Tip: tap any tile next to the empty space.</p>
    </div>

    <script>
        const GRID = 4;
        const EMPTY = 0;
        const board = [];
        let moves = 0;

        const boardEl = document.getElementById('puzzleBoard');
        const completeEl = document.getElementById('puzzleComplete');
        const movesEl = document.getElementById('movesCount');
        const openBtn = document.getElementById('openBtn');
        const solvedInput = document.getElementById('puzzleSolvedInput');
        const shuffleBtn = document.getElementById('shuffleBtn');

        function initSolvedBoard() {
            board.length = 0;
            for (let i = 1; i < GRID * GRID; i++) {
                board.push(i);
            }
            board.push(EMPTY);
            moves = 0;
            solvedInput.value = '0';
            openBtn.disabled = true;
            openBtn.textContent = 'Unlock';
            movesEl.textContent = 'Moves: 0';
        }

        function isAdjacent(indexA, indexB) {
            const rowA = Math.floor(indexA / GRID);
            const colA = indexA % GRID;
            const rowB = Math.floor(indexB / GRID);
            const colB = indexB % GRID;
            return Math.abs(rowA - rowB) + Math.abs(colA - colB) === 1;
        }

        function isSolved() {
            for (let i = 0; i < GRID * GRID - 1; i++) {
                if (board[i] !== i + 1) {
                    return false;
                }
            }
            return board[GRID * GRID - 1] === EMPTY;
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            for (let i = 0; i < board.length; i++) {
                const value = board[i];
                const tile = document.createElement('button');
                tile.type = 'button';

                if (value === EMPTY) {
                    tile.className = 'puzzle-empty';
                    tile.setAttribute('aria-label', 'Empty tile');
                } else {
                    tile.className = 'puzzle-tile';
                    const imageIndex = value - 1;
                    const row = Math.floor(imageIndex / GRID);
                    const col = imageIndex % GRID;
                    tile.style.backgroundImage = "url('/puzzle.png')";
                    tile.style.backgroundSize = `${GRID * 100}% ${GRID * 100}%`;
                    tile.style.backgroundPosition = `${(col / (GRID - 1)) * 100}% ${(row / (GRID - 1)) * 100}%`;
                    tile.setAttribute('aria-label', `Puzzle tile ${value}`);
                    tile.addEventListener('click', () => moveTile(i));
                }

                boardEl.appendChild(tile);
            }
        }

        function moveTile(index) {
            const emptyIndex = board.indexOf(EMPTY);
            if (!isAdjacent(index, emptyIndex)) {
                return;
            }

            [board[index], board[emptyIndex]] = [board[emptyIndex], board[index]];
            moves += 1;
            movesEl.textContent = `Moves: ${moves}`;
            renderBoard();

            if (isSolved()) {
                boardEl.classList.add('hidden');
                completeEl.classList.add('show');
                solvedInput.value = '1';
                openBtn.disabled = false;
                openBtn.textContent = 'Open Your Gift';
            }
        }

        function shuffleBoard() {
            const movesToMix = 90;
            for (let i = 0; i < movesToMix; i++) {
                const emptyIndex = board.indexOf(EMPTY);
                const candidates = [];
                const offsets = [-GRID, GRID, -1, 1];

                for (const offset of offsets) {
                    const next = emptyIndex + offset;
                    if (next < 0 || next >= board.length) {
                        continue;
                    }
                    if (!isAdjacent(emptyIndex, next)) {
                        continue;
                    }
                    candidates.push(next);
                }

                const choice = candidates[Math.floor(Math.random() * candidates.length)];
                [board[choice], board[emptyIndex]] = [board[emptyIndex], board[choice]];
            }

            if (isSolved()) {
                shuffleBoard();
                return;
            }

            moves = 0;
            solvedInput.value = '0';
            openBtn.disabled = true;
            openBtn.textContent = 'Unlock';
            movesEl.textContent = 'Moves: 0';
            boardEl.classList.remove('hidden');
            completeEl.classList.remove('show');
            renderBoard();
        }

        shuffleBtn.addEventListener('click', shuffleBoard);

        initSolvedBoard();
        shuffleBoard();
    </script>
</body>

</html>
