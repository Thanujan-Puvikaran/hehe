<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0c0f;
            --text: rgba(255, 255, 255, .92);
            --muted: rgba(255, 255, 255, .55);
            --line: rgba(255, 255, 255, .10);
            --panel: rgba(255, 255, 255, .03);
            --gold: rgba(255, 209, 102, .85);
            --gold-glow: rgba(255, 209, 102, .15);
            --radius: 24px;
            --shadow: 0 24px 80px rgba(0, 0, 0, .6);
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(800px 500px at 50% -5%, rgba(255, 209, 102, .06), transparent 55%),
                radial-gradient(600px 400px at 15% 85%, rgba(255, 255, 255, .03), transparent 60%),
                radial-gradient(500px 350px at 85% 90%, rgba(255, 209, 102, .03), transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500"><filter id="n"><feTurbulence baseFrequency="0.9" numOctaves="4"/></filter><rect width="500" height="500" filter="url(%23n)" opacity="0.025"/></svg>');
            pointer-events: none;
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 64px 52px 56px;
            max-width: 720px;
            width: 100%;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            text-align: center;
            overflow: hidden;
        }

        @media (max-width: 620px) {
            .login-container {
                padding: 34px 16px 30px;
                max-width: 100%;
            }

            h1 {
                font-size: 1.7em;
            }

            .subtitle {
                margin-bottom: 22px;
                font-size: 0.88em;
            }
        }

        .floats {
            font-size: 1.8em;
            letter-spacing: 0.15em;
            margin-bottom: 32px;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--gold);
            font-size: 2.1em;
            font-weight: 400;
            letter-spacing: 0.01em;
            line-height: 1.2;
            margin-bottom: 14px;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 44px;
            font-size: 0.93em;
            font-weight: 300;
            letter-spacing: 0.02em;
            line-height: 1.6;
        }

        .puzzle-wrap {
            margin: 0 auto;
            width: 100%;
            max-width: 420px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .puzzle-board {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            padding: 0;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .04);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .03);
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        .puzzle-board.hidden {
            display: none;
        }

        .puzzle-complete {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 14px;
            border: 1px solid rgba(255, 209, 102, .35);
            background: url('/puzzle.png') center/cover no-repeat;
            box-shadow: 0 0 32px rgba(255, 209, 102, .12);
            animation: slideIn 0.5s ease;
            display: none;
        }

        .puzzle-complete.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .puzzle-tile {
            display: block;
            border: 1px solid rgba(255, 255, 255, .06);
            border-radius: 0;
            background-repeat: no-repeat;
            background-size: 400% 400%;
            background-position: center;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease;
            touch-action: manipulation;
        }

        .puzzle-tile:hover {
            transform: scale(0.98);
            box-shadow: 0 0 0 1px rgba(255, 209, 102, .35);
        }

        .puzzle-empty {
            border-radius: 8px;
            background: rgba(255, 255, 255, .03);
            border: 1px dashed rgba(255, 255, 255, .15);
            cursor: default;
        }

        .puzzle-status {
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.84em;
            text-align: right;
            min-height: 20px;
        }

        .puzzle-status.solved {
            color: rgba(100, 200, 100, .85);
            font-weight: 500;
        }

        .puzzle-controls {
            margin-top: 10px;
            display: flex;
            justify-content: center;
        }

        .puzzle-shuffle {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .04);
            color: var(--muted);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 12px;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: all .2s ease;
        }

        .puzzle-shuffle:hover {
            border-color: rgba(255, 255, 255, .25);
            color: var(--text);
            transform: translateY(-1px);
            background: rgba(255, 255, 255, .08);
        }

        .open-btn {
            background: var(--gold-glow);
            color: var(--gold);
            border: 1px solid rgba(255, 209, 102, .22);
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.05em;
        }

        .open-btn:hover {
            background: rgba(255, 209, 102, .22);
            border-color: rgba(255, 209, 102, .40);
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(255, 209, 102, .12);
        }

        .open-btn:active {
            transform: translateY(0);
        }

        .note {
            margin-top: 32px;
            color: var(--muted);
            font-size: 0.82em;
            font-weight: 300;
            letter-spacing: 0.01em;
            line-height: 1.6;
        }

        .error-msg {
            background: rgba(255, 80, 80, .08);
            border: 1px solid rgba(255, 80, 80, .18);
            color: rgba(255, 130, 130, .9);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.88em;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="floats">✦ ✦ ✦ ✦ ✦</div>
        <h1>To my love</h1>
        <p class="subtitle">Solve this 4x4 puzzle to unlock your birthday surprise.</p>
        <form action="/login" method="POST" id="loginForm">
            <input type="hidden" name="redirect" value="index">
            <input type="hidden" name="puzzle_solved" value="0" id="puzzleSolvedInput">
            <div class="puzzle-wrap">
                <div id="puzzleBoard" class="puzzle-board"></div>
                <div id="puzzleComplete" class="puzzle-complete"></div>
                <div class="puzzle-status" id="puzzleStatus"></div>
                <div class="puzzle-controls">
                    <button type="button" class="puzzle-shuffle" id="shuffleBtn">Shuffle</button>
                </div>
            </div>
            <button type="submit" id="openBtn" class="open-btn" disabled>Unlock</button>
        </form>
        <p class="note">💛 Tip: tap any tile next to the empty space.</p>
    </div>

    <script>
        const GRID_SIZE = 4;
        let tiles = [];
        let emptyPos = { row: GRID_SIZE - 1, col: GRID_SIZE - 1 };
        let isSolved = false;
        let moves = 0;

        function initPuzzle() {
            tiles = [];
            for (let i = 0; i < GRID_SIZE * GRID_SIZE - 1; i++) {
                tiles.push(i);
            }
            tiles.push(null);
            emptyPos = { row: GRID_SIZE - 1, col: GRID_SIZE - 1 };
            isSolved = false;
            moves = 0;
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('puzzleBoard');
            board.innerHTML = '';
            const boardSize = board.offsetWidth;
            const bgSize = boardSize + 'px ' + boardSize + 'px';
            const tileSize = boardSize / GRID_SIZE;
            tiles.forEach((tileNum, idx) => {
                const tile = document.createElement('div');
                if (tileNum === null) {
                    tile.className = 'puzzle-tile puzzle-empty';
                } else {
                    tile.className = 'puzzle-tile';
                    tile.style.backgroundImage = 'url(/puzzle.png)';
                    tile.style.backgroundSize = bgSize;
                    const col = tileNum % GRID_SIZE;
                    const row = Math.floor(tileNum / GRID_SIZE);
                    tile.style.backgroundPosition = `${-(col * tileSize)}px ${-(row * tileSize)}px`;
                    tile.addEventListener('click', () => moveTile(idx));
                }
                board.appendChild(tile);
            });
            checkSolved();
        }

        function moveTile(idx) {
            const row = Math.floor(idx / GRID_SIZE);
            const col = idx % GRID_SIZE;
            const canMove = (Math.abs(row - emptyPos.row) === 1 && col === emptyPos.col) ||
                (Math.abs(col - emptyPos.col) === 1 && row === emptyPos.row);
            if (canMove) {
                [tiles[idx], tiles[emptyPos.row * GRID_SIZE + emptyPos.col]] =
                    [tiles[emptyPos.row * GRID_SIZE + emptyPos.col], tiles[idx]];
                emptyPos = { row, col };
                moves++;
                renderBoard();
            }
        }

        function shufflePuzzle() {
            for (let i = 0; i < 30; i++) {
                const emptyIdx = emptyPos.row * GRID_SIZE + emptyPos.col;
                const neighbors = [];
                if (emptyPos.row > 0) neighbors.push((emptyPos.row - 1) * GRID_SIZE + emptyPos.col);
                if (emptyPos.row < GRID_SIZE - 1) neighbors.push((emptyPos.row + 1) * GRID_SIZE + emptyPos.col);
                if (emptyPos.col > 0) neighbors.push(emptyPos.row * GRID_SIZE + (emptyPos.col - 1));
                if (emptyPos.col < GRID_SIZE - 1) neighbors.push(emptyPos.row * GRID_SIZE + (emptyPos.col + 1));
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[emptyIdx], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyIdx]];
                emptyPos = { row: Math.floor(randomNeighbor / GRID_SIZE), col: randomNeighbor % GRID_SIZE };
            }
            isSolved = false;
            moves = 0;
            renderBoard();
        }

        function checkSolved() {
            isSolved = tiles.slice(0, -1).every((tile, idx) => tile === idx) && tiles[tiles.length - 1] === null;
            const status = document.getElementById('puzzleStatus');
            const complete = document.getElementById('puzzleComplete');
            const board = document.getElementById('puzzleBoard');
            const input = document.getElementById('puzzleSolvedInput');
            const btn = document.getElementById('openBtn');
            if (isSolved) {
                status.textContent = `Moves: ${moves} ✓`;
                status.classList.add('solved');
                board.classList.add('hidden');
                complete.classList.add('show');
                input.value = '1';
                btn.disabled = false;
                btn.textContent = 'Unlock';
            } else {
                status.textContent = `Moves: ${moves}`;
                status.classList.remove('solved');
                board.classList.remove('hidden');
                complete.classList.remove('show');
                input.value = '0';
                btn.disabled = true;
            }
        }

        document.getElementById('shuffleBtn').addEventListener('click', shufflePuzzle);
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            if (!isSolved) {
                e.preventDefault();
                alert('Please solve the puzzle first!');
            }
        });

        window.addEventListener('load', () => {
            initPuzzle();
            shufflePuzzle();
        });
    </script>
</body>

</html>
