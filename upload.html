<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories Together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@200;300;400;500;600&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@200;300;400;500;600&display=swap"
      rel="stylesheet">
  </noscript>
  <link rel="stylesheet" href="styles.min.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    /* Upload-specific styles */
    .upload-section {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
    }

    .upload-btn {
      background: rgba(255, 255, 255, .10);
      backdrop-filter: blur(20px);
      color: var(--text);
      border: 1px solid var(--line);
      padding: 16px 32px;
      border-radius: 50px;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .3s;
      box-shadow: var(--shadow);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.02em;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, .14);
      border-color: rgba(255, 255, 255, .20);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .65);
    }

    .upload-section.drag-over .upload-btn {
      transform: translateY(-2px) scale(1.03);
      background: rgba(255, 209, 102, .16);
      border-color: rgba(255, 209, 102, .34);
      box-shadow: 0 24px 70px rgba(255, 209, 102, .16);
    }

    #photoInput {
      display: none;
    }

    .upload-progress {
      position: fixed;
      bottom: 120px;
      right: 30px;
      width: 300px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      z-index: 999;
      display: none;
    }

    .upload-progress.active {
      display: block;
    }

    .upload-progress-title {
      font-weight: 500;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .upload-progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, .1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .upload-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(255, 209, 102, 0.6), rgba(255, 209, 102, 0.9));
      width: 0%;
      transition: width 0.3s ease;
    }

    .upload-progress-text {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
    }

    .upload-feedback {
      position: fixed;
      bottom: 30px;
      right: 30px;
      max-width: 300px;
      padding: 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 1001;
      animation: slideIn 0.3s ease;
      display: none;
    }

    .upload-feedback.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: rgba(34, 197, 94, 0.9);
      display: block;
    }

    .upload-feedback.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: rgba(239, 68, 68, 0.9);
      display: block;
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .drawing-section {
      margin-top: 60px;
      width: 100%;
    }

    .drawing-section h2 {
      text-align: center;
      margin-bottom: 40px;
    }

    .canvas-container {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    #drawingCanvas {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: crosshair;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: center;
      padding: 25px;
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      margin-bottom: 30px;
    }

    .controls label {
      font-weight: 400;
      color: var(--text);
      font-size: .9rem;
    }

    .controls input[type="color"],
    .controls input[type="range"] {
      cursor: pointer;
    }

    .controls button {
      background: rgba(255, 255, 255, .10);
      color: var(--text);
      border: 1px solid var(--line);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .3s;
    }

    .controls button:hover {
      background: rgba(255, 255, 255, .14);
      border-color: rgba(255, 255, 255, .20);
      transform: translateY(-1px);
    }

    .controls button.danger {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .controls button.danger:hover {
      background: rgba(239, 68, 68, 0.25);
      border-color: rgba(239, 68, 68, 0.5);
    }

    .drawings-gallery-section {
      margin-top: 80px;
      padding: 60px 0;
      border-top: 1px solid var(--line);
    }

    .drawings-gallery-section h2 {
      text-align: center;
      margin-bottom: 40px;
    }

    .drawings-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      padding: 0 20px;
    }

    .drawing-item {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      transition: all 0.3s;
      cursor: pointer;
    }

    .drawing-item:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.65);
    }

    .drawing-item img {
      width: 100%;
      height: auto;
      aspect-ratio: 4/3;
      object-fit: cover;
    }

    .drawing-info {
      padding: 16px;
    }

    .drawing-title {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .drawing-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .drawing-actions button {
      flex: 1;
      padding: 8px 12px;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .drawing-actions button:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .drawing-actions button.delete {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
    }

    .drawing-actions button.delete:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .no-drawings {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 1rem;
    }

    .photo-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 10px;
      background: rgba(0, 0, 0, 0);
      opacity: 0;
      transition: all 0.3s ease;
    }

    .photo-item:hover .photo-overlay {
      background: rgba(0, 0, 0, 0.5);
      opacity: 1;
    }

    .photo-delete-btn {
      background: rgba(239, 68, 68, 0.8);
      border: 1px solid rgba(239, 68, 68, 1);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      padding: 0;
      transform: scale(0);
    }

    .photo-item:hover .photo-delete-btn {
      transform: scale(1);
    }

    .photo-delete-btn:hover {
      background: rgba(239, 68, 68, 1);
      transform: scale(1.1);
    }

    .photo-delete-btn:active {
      transform: scale(0.95);
    }

    /* accessibility */
    @media (prefers-reduced-motion: reduce) {
      .scroll-indicator {
        animation: none;
      }

      .photo-item {
        transition: none;
      }

      .photo-item img {
        transition: none;
      }
    }

    /* mobile */
    @media (max-width: 768px) {
      .container {
        padding: 40px 16px;
      }

      .photos-gallery {
        gap: 56px;
        padding: 56px 0 100px;
      }

      #drawingCanvas {
        max-width: 100%;
      }

      .upload-section {
        bottom: 20px;
        right: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container" id="mainContent">
    <!-- Hero Section -->
    <div class="hero-section">
      <h1>Our Memories Together</h1>
      <div class="scroll-indicator">↓ SCROLL ↓</div>
    </div>

    <!-- Photos Sort Toggle -->
    <div style="text-align:center; margin-bottom: 12px;">
      <button id="sortToggleBtn" onclick="togglePhotoSort()"
        style="background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 13px;">⬇
        Newest first</button>
    </div>

    <!-- Photos Gallery -->
    <div class="photos-gallery" id="photosGallery">
      <!-- Photos will be inserted here -->
    </div>

    <!-- Upload Button -->
    <div class="upload-section">
      <input type="file" id="photoInput" accept="image/*" multiple>
      <button class="upload-btn" onclick="document.getElementById('photoInput').click()">📸 Add Photos</button>
    </div>

    <!-- Upload Progress -->
    <div class="upload-progress" id="uploadProgress">
      <div class="upload-progress-title">Uploading...</div>
      <div class="upload-progress-bar">
        <div class="upload-progress-fill" id="progressFill"></div>
      </div>
      <div class="upload-progress-text"><span id="progressPercent">0</span>%</div>
    </div>

    <!-- Upload Feedback -->
    <div class="upload-feedback" id="uploadFeedback"></div>

    <!-- Drawing Section -->
    <div class="drawing-section">
      <h2>Express What's in Your Heart</h2>

      <div class="controls">
        <label for="colorPicker">Color:</label>
        <input type="color" id="colorPicker" value="#ffffff">

        <label for="brushSize">Brush Size:</label>
        <input type="range" id="brushSize" min="1" max="50" value="5">
        <span id="sizeDisplay">5px</span>

        <button id="clearBtn" class="danger">Clear Canvas</button>
        <button id="saveBtn">Save Drawing</button>
        <button id="eraserBtn">Eraser</button>
      </div>

      <div class="canvas-container">
        <canvas id="drawingCanvas" width="800" height="600"></canvas>
      </div>
    </div>

    <!-- Drawings Gallery -->
    <div class="drawings-gallery-section">
      <h2>Your Drawings</h2>
      <div class="drawings-gallery" id="drawingsGallery">
        <p class="no-drawings">No drawings saved yet</p>
      </div>
    </div>
  </div>

  <!-- Offline Banner -->
  <div id="offlineBanner"
    style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;padding:12px 20px;text-align:center;font-size:.85rem;letter-spacing:.05em;background:rgba(30,30,35,.95);border-bottom:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);backdrop-filter:blur(12px);">
    ⚡ You're offline — uploads will retry automatically when reconnected
  </div>

  <script>

    // Canvas Setup
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let currentColor = '#ffffff';
    let brushSize = 5;
    let isEraser = false;

    /**
     * Start drawing on the canvas when mouse is pressed.
     * @param {MouseEvent} e - Mouse event object
     */
    function startDrawing(e) {
      isDrawing = true;
      draw(e);
    }

    /**
     * Stop drawing on the canvas when mouse is released or mouse leaves canvas.
     */
    function stopDrawing() {
      isDrawing = false;
      ctx.beginPath();
    }

    /**
     * Draw on the canvas based on mouse or touch position.
     * @param {MouseEvent|TouchEvent} e - Event object
     */
    function draw(e) {
      if (!isDrawing) return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.strokeStyle = isEraser ? '#ffffff' : currentColor;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    // Event Listeners for Drawing
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseout', stopDrawing);

    // Touch support for mobile
    canvas.addEventListener('touchstart', (e) => {
      /**
       * Handle touch start event for drawing on mobile devices.
       * @param {TouchEvent} e - Touch event object
       */
      e.preventDefault();
      const touch = e.touches[0];
      const mouseEvent = new MouseEvent('mousedown', {
        clientX: touch.clientX,
        clientY: touch.clientY
      });
      canvas.dispatchEvent(mouseEvent);
    });

    canvas.addEventListener('touchmove', (e) => {
      /**
       * Handle touch move event for drawing on mobile devices.
       * @param {TouchEvent} e - Touch event object
       */
      e.preventDefault();
      const touch = e.touches[0];
      const mouseEvent = new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY
      });
      canvas.dispatchEvent(mouseEvent);
    });

    canvas.addEventListener('touchend', (e) => {
      /**
       * Handle touch end event for drawing on mobile devices.
       * @param {TouchEvent} e - Touch event object
       */
      e.preventDefault();
      const mouseEvent = new MouseEvent('mouseup', {});
      canvas.dispatchEvent(mouseEvent);
    });

    // Color Picker
    document.getElementById('colorPicker').addEventListener('change', (e) => {
      /**
       * Change the drawing color based on color picker selection.
       * @param {Event} e - Change event object
       */
      currentColor = e.target.value;
      isEraser = false;
    });

    // Brush Size
    document.getElementById('brushSize').addEventListener('input', (e) => {
      /**
       * Change the brush size for drawing.
       * @param {Event} e - Input event object
       */
      brushSize = e.target.value;
      document.getElementById('sizeDisplay').textContent = brushSize + 'px';
    });

    // Clear Canvas
    document.getElementById('clearBtn').addEventListener('click', () => {
      /**
       * Clear the entire canvas after user confirmation.
       */
      if (confirm('Are you sure you want to clear the canvas?')) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    });

    // Eraser
    document.getElementById('eraserBtn').addEventListener('click', () => {
      /**
       * Toggle eraser mode for drawing.
       */
      isEraser = !isEraser;
      const btn = document.getElementById('eraserBtn');
      btn.style.background = isEraser ? 'rgba(251, 191, 36, 0.4)' : 'rgba(139, 92, 246, 0.3)';
      btn.textContent = isEraser ? 'Drawing Mode' : 'Eraser';
    });

    // Save Drawing (both locally and to Firebase)
    document.getElementById('saveBtn').addEventListener('click', async () => {
      /**
       * Save the current canvas drawing locally as PNG and to Firebase database.
       */
      const drawingDataURL = canvas.toDataURL();

      // Download locally
      const link = document.createElement('a');
      link.download = 'my-message-' + Date.now() + '.png';
      link.href = drawingDataURL;
      link.click();

      // Also save to Firebase for persistence
      try {
        // Wait for Firebase initialization
        const user = firebase.auth().currentUser;
        if (user) {
          const timestamp = new Date();
          const timeStr = timestamp.toLocaleString();

          const drawingRef = database.ref('drawings').push();
          await drawingRef.set({
            url: drawingDataURL,
            timestamp: Date.now(),
            title: 'Drawing from ' + timeStr,
            uploadedBy: user.uid
          });

          showFeedback('✨ Drawing saved to gallery!', 'success', 3000);
          console.log('Drawing saved to gallery');

          // Refresh drawings gallery
          setTimeout(() => loadDrawings(), 500);
        }
      } catch (error) {
        console.error('Error saving drawing to gallery:', error);
        showFeedback('⚠️ Drawing downloaded, but gallery save failed.', 'error', 4000);
      }
    });

    let database = null;

    async function initializeFirebaseForUpload() {
      const response = await fetch('/firebase-config.json', {
        credentials: 'same-origin',
        cache: 'no-store'
      });
      if (!response.ok) {
        throw new Error('Failed to load Firebase config');
      }

      const firebaseConfig = await response.json();
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      database = firebase.database();

      await firebase.auth().signInAnonymously();
      firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          updateOfflineBanner();
          loadPhotos();
          loadDrawings();
        }
      });
    }

    // Offline upload queue and retry tracking
    const uploadQueue = [];
    let retryTimer = null;

    /**
     * Update offline banner and trigger retry on reconnect.
     */
    function updateOfflineBanner() {
      const banner = document.getElementById('offlineBanner');
      if (!navigator.onLine) {
        banner.style.display = 'block';
        document.body.style.paddingTop = '44px';
        showFeedback('\u26a1 You\'re offline. Uploads queued.', 'error', 0);
      } else {
        banner.style.display = 'none';
        document.body.style.paddingTop = '';
        if (uploadQueue.length > 0) {
          showFeedback(`Reconnected! Retrying ${uploadQueue.length} queued upload(s)…`, 'success', 3000);
          retryQueuedUploads();
        }
      }
    }

    /**
     * Retry all queued uploads after reconnection.
     */
    async function retryQueuedUploads() {
      if (!database) return;
      if (!navigator.onLine || uploadQueue.length === 0) return;
      showFeedback(`Retrying ${uploadQueue.length} upload(s)...`, 'success', 2000);
      while (uploadQueue.length > 0) {
        const item = uploadQueue.shift();
        try {
          const photoRef = database.ref('photos').push();
          await photoRef.set(item.data);
          displayPhoto(item.data.url, photoRef.key, true);
          console.log('Retried upload succeeded:', item.data.name);
        } catch (err) {
          console.error('Retry failed:', err);
          uploadQueue.unshift(item); // Put back at front
          showFeedback('Retry failed. Will try again when online.', 'error', 3000);
          break;
        }
      }
      if (uploadQueue.length === 0) {
        showFeedback('\u2728 All queued uploads complete!', 'success');
      }
    }

    window.addEventListener('online', updateOfflineBanner);
    window.addEventListener('offline', updateOfflineBanner);

    // Photo Upload Handling with Security and Metadata
    const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB
    const ALLOWED_TYPES = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'image/webp'];

    /**
     * Get the current user identifier (from session or firebase auth)
     * @returns {string} User identifier
     */
    function getUserIdentifier() {
      const user = firebase.auth().currentUser;
      return user ? user.uid : 'anonymous-' + Date.now();
    }

    /**
     * Compress image before upload using canvas.
     * @param {string} dataURL - Original image data URL
     * @param {number} quality - Compression quality (0-1)
     * @returns {Promise<string>} Compressed image data URL
     */
    async function compressImage(dataURL, quality = 0.8) {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = dataURL;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const maxWidth = 1920;
          const maxHeight = 1440;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > maxWidth) {
              height *= maxWidth / width;
              width = maxWidth;
            }
          } else {
            if (height > maxHeight) {
              width *= maxHeight / height;
              height = maxHeight;
            }
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
      });
    }

    /**
     * Show upload feedback message.
     * @param {string} message - Feedback message 
     * @param {string} type - "success" or "error"
     * @param {number} duration - Duration in ms (0 = permanent)
     */
    function showFeedback(message, type = 'success', duration = 3000) {
      const feedback = document.getElementById('uploadFeedback');
      feedback.textContent = message;
      feedback.className = `upload-feedback ${type}`;

      if (duration > 0) {
        setTimeout(() => {
          feedback.className = 'upload-feedback';
        }, duration);
      }
    }

    /**
     * Update upload progress.
     * @param {number} percent - Progress percentage (0-100)
     */
    function updateProgress(percent) {
      const progress = document.getElementById('uploadProgress');
      const fill = document.getElementById('progressFill');
      const text = document.getElementById('progressPercent');

      fill.style.width = percent + '%';
      text.textContent = Math.round(percent);

      if (percent === 0) {
        progress.classList.remove('active');
      } else if (percent < 100) {
        progress.classList.add('active');
      }
    }

    async function processSelectedFiles(files) {
      if (!database) {
        showFeedback('❌ Firebase not ready yet. Please retry in a moment.', 'error', 3000);
        return;
      }
      if (!files || files.length === 0) {
        return;
      }

      const totalFiles = files.length;
      let uploadedCount = 0;

      // Validate user is authenticated
      const user = firebase.auth().currentUser;
      if (!user) {
        showFeedback('❌ Authentication error. Please refresh.', 'error');
        return;
      }

      for (let i = 0; i < totalFiles; i++) {
        const file = files[i];

        // Validate file type
        if (!ALLOWED_TYPES.includes(file.type)) {
          showFeedback(`❌ ${file.name}: Invalid type. Images only.`, 'error', 4000);
          continue;
        }

        // Validate file size
        if (file.size > MAX_FILE_SIZE) {
          showFeedback(`❌ ${file.name}: Too large (max 5MB)`, 'error', 4000);
          continue;
        }

        try {
          updateProgress((uploadedCount / totalFiles) * 50);

          // Read file as data URL
          const reader = new FileReader();

          reader.onload = async (event) => {
            try {
              const originalDataURL = event.target.result;
              const originalSize = file.size;

              // Compress image
              updateProgress((uploadedCount / totalFiles) * 70);
              const compressedDataURL = await compressImage(originalDataURL);

              updateProgress((uploadedCount / totalFiles) * 85);

              const photoData = {
                url: compressedDataURL,
                timestamp: Date.now(),
                size: file.size,
                type: file.type,
                name: file.name,
                uploadedBy: getUserIdentifier(),
                caption: ''
              };

              // Queue upload if offline, otherwise save to Firebase
              if (!navigator.onLine) {
                uploadQueue.push({ data: photoData });
                uploadedCount++;
                updateProgress((uploadedCount / totalFiles) * 100);
                if (uploadedCount === totalFiles) {
                  showFeedback(`\u26a1 Offline \u2014 ${uploadedCount} photo(s) queued`, 'error', 0);
                  updateProgress(0);
                }
                return;
              }

              // Save to Firebase Database with full metadata
              const photoRef = database.ref('photos').push();
              await photoRef.set(photoData);

              uploadedCount++;
              updateProgress((uploadedCount / totalFiles) * 100);

              // Display photo
              displayPhoto(compressedDataURL, photoRef.key, true);

              // Show success after last file
              if (uploadedCount === totalFiles) {
                updateProgress(100);
                setTimeout(() => {
                  showFeedback(`✨ ${uploadedCount} photo${uploadedCount > 1 ? 's' : ''} uploaded!`, 'success');
                  updateProgress(0);
                }, 500);
              }

              console.log(`✓ Photo ${uploadedCount}/${totalFiles}: ${file.name} (${(originalSize / 1024).toFixed(0)}KB)`);
            } catch (error) {
              console.error('Upload error:', error);
              showFeedback(`❌ Error uploading ${file.name}`, 'error', 4000);
              uploadedCount++;
              if (uploadedCount === totalFiles) {
                updateProgress(0);
              }
            }
          };

          reader.readAsDataURL(file);

        } catch (error) {
          console.error('Error processing file:', error);
          showFeedback(`❌ Error processing ${file.name}`, 'error', 4000);
          uploadedCount++;
        }
      }

      // Clear input
      e.target.value = '';
    }

    document.getElementById('photoInput').addEventListener('change', async (e) => {
      await processSelectedFiles(Array.from(e.target.files || []));

      // Clear input
      e.target.value = '';
    });

    // Store photo IDs for management
    const photoIds = {};

    /**
     * Delete a photo from Firebase database.
     * @param {string} photoId - Firebase reference key
     * @param {string} photoUrl - Photo URL for DOM removal
     */
    async function deletePhoto(photoId, photoUrl) {
      if (!confirm('Are you sure you want to delete this photo? This cannot be undone.')) {
        return;
      }
      if (!navigator.onLine) {
        showFeedback('❌ Cannot delete while offline.', 'error', 3000);
        return;
      }

      try {
        await database.ref('photos/' + photoId).remove();

        // Remove from DOM
        const photoItem = document.querySelector(`[data-photo-id="${photoId}"]`);
        if (photoItem) {
          photoItem.style.opacity = '0';
          photoItem.style.transform = 'scale(0.9)';
          setTimeout(() => photoItem.remove(), 300);
        }

        console.log('Photo deleted successfully');
      } catch (error) {
        console.error('Error deleting photo:', error);
        showFeedback('Error deleting photo. Please try again.', 'error', 3000);
      }
    }

    function displayPhoto(photoUrl, photoId = null, showDelete = false) {
      const photosGallery = document.getElementById('photosGallery');
      const photoItem = document.createElement('div');
      photoItem.className = 'photo-item';
      if (photoId) {
        photoItem.setAttribute('data-photo-id', photoId);
        photoIds[photoId] = photoUrl;
      }

      const img = document.createElement('img');
      img.src = photoUrl;
      img.alt = 'Memory';
      img.loading = 'lazy';
      img.decoding = 'async';

      photoItem.appendChild(img);

      // Add delete button for admin upload page
      if (showDelete && photoId) {
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'photo-delete-btn';
        deleteBtn.innerHTML = '🗑️';
        deleteBtn.title = 'Delete photo';
        deleteBtn.onclick = (e) => {
          e.preventDefault();
          e.stopPropagation();
          deletePhoto(photoId, photoUrl);
        };

        // Create overlay container for delete button
        const overlay = document.createElement('div');
        overlay.className = 'photo-overlay';
        overlay.appendChild(deleteBtn);
        photoItem.appendChild(overlay);
      }

      photosGallery.appendChild(photoItem);

      setTimeout(() => checkScrollAnimations(), 100);
    }

    /**
     * Load existing photos from Firebase with delete capability on upload page.
     */
    let currentSortOrder = 'newest';

    async function togglePhotoSort() {
      currentSortOrder = currentSortOrder === 'newest' ? 'oldest' : 'newest';
      try {
        await database.ref('settings/photoOrder').set(currentSortOrder);
      } catch (error) {
        console.warn('Could not save photo order setting:', error);
      }
      updateSortButton();
      document.getElementById('photosGallery').innerHTML = '';
      await loadPhotos();
    }

    function updateSortButton() {
      const btn = document.getElementById('sortToggleBtn');
      if (btn) btn.textContent = currentSortOrder === 'newest' ? '⬇ Newest first' : '⬆ Oldest first';
    }

    async function loadPhotos() {
      if (!database) return;
      try {
        const photosSnapshot = await database.ref('photos').once('value');
        try {
          const settingSnap = await database.ref('settings/photoOrder').once('value');
          currentSortOrder = settingSnap.val() || 'newest';
        } catch (settingError) {
          currentSortOrder = 'newest';
          console.warn('Photo order setting unavailable, defaulting to newest:', settingError);
        }
        updateSortButton();
        const photos = photosSnapshot.val();

        if (photos) {
          const sorted = Object.entries(photos).sort(([, a], [, b]) =>
            currentSortOrder === 'newest' ? (b.timestamp || 0) - (a.timestamp || 0) : (a.timestamp || 0) - (b.timestamp || 0)
          );
          const isUploadPage = window.location.pathname.includes('upload.html');
          sorted.forEach(([photoId, photo]) => {
            displayPhoto(photo.url, photoId, isUploadPage);
          });
        }
      } catch (error) {
        console.error('Error loading photos:', error);
        const msg = navigator.onLine
          ? 'Could not load photos. Check your Firebase connection.'
          : 'Offline \u2014 photos unavailable until reconnected.';
        showFeedback(msg, 'error', 4000);
      }
    }

    // Initialize Firebase after script setup.
    initializeFirebaseForUpload().catch((error) => {
      console.error('Firebase initialization failed:', error);
      showFeedback('Connection error. Check server Firebase config.', 'error', 0);
    });

    /**
     * Load drawings from Firebase and display in gallery.
     */
    async function loadDrawings() {
      if (!database) return;
      try {
        const drawingsSnapshot = await database.ref('drawings').once('value');
        const drawings = drawingsSnapshot.val();
        const gallery = document.getElementById('drawingsGallery');

        if (!drawings || Object.keys(drawings).length === 0) {
          gallery.innerHTML = '<p class="no-drawings">No drawings saved yet</p>';
          return;
        }

        gallery.innerHTML = '';
        Object.entries(drawings).forEach(([drawingId, drawing]) => {
          displayDrawing(drawing, drawingId);
        });
      } catch (error) {
        console.error('Error loading drawings:', error);
        const msg = navigator.onLine
          ? 'Could not load drawings. Check your Firebase connection.'
          : 'Offline \u2014 drawings unavailable until reconnected.';
        showFeedback(msg, 'error', 4000);
      }
    }

    /**
     * Display a drawing in the gallery with actions.
     * @param {object} drawing - Drawing object from Firebase
     * @param {string} drawingId - Firebase reference ID
     */
    function displayDrawing(drawing, drawingId) {
      const gallery = document.getElementById('drawingsGallery');

      // Remove "no drawings" message if it exists
      const noDrawingsMessage = gallery.querySelector('.no-drawings');
      if (noDrawingsMessage) {
        noDrawingsMessage.remove();
      }

      const drawingItem = document.createElement('div');
      drawingItem.className = 'drawing-item';
      drawingItem.setAttribute('data-drawing-id', drawingId);

      const img = document.createElement('img');
      img.src = drawing.url;
      img.alt = 'Drawing';
      img.loading = 'lazy';
      img.decoding = 'async';

      const info = document.createElement('div');
      info.className = 'drawing-info';

      const title = document.createElement('div');
      title.className = 'drawing-title';
      title.textContent = drawing.title || 'Untitled Drawing';

      const actions = document.createElement('div');
      actions.className = 'drawing-actions';

      // Download button
      const downloadBtn = document.createElement('button');
      downloadBtn.innerHTML = '⬇️ Download';
      downloadBtn.title = 'Download drawing';
      downloadBtn.onclick = (e) => {
        e.preventDefault();
        const link = document.createElement('a');
        link.href = drawing.url;
        link.download = (drawing.title || 'drawing') + '.png';
        link.click();
      };

      // Delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete';
      deleteBtn.innerHTML = '🗑️ Delete';
      deleteBtn.title = 'Delete drawing';
      deleteBtn.onclick = (e) => {
        e.preventDefault();
        deleteDrawing(drawingId);
      };

      actions.appendChild(downloadBtn);
      actions.appendChild(deleteBtn);

      info.appendChild(title);
      info.appendChild(actions);
      drawingItem.appendChild(img);
      drawingItem.appendChild(info);
      gallery.appendChild(drawingItem);
    }

    /**
     * Delete a drawing from Firebase.
     * @param {string} drawingId - Firebase reference ID
     */
    async function deleteDrawing(drawingId) {
      if (!confirm('Delete this drawing? This cannot be undone.')) {
        return;
      }
      if (!navigator.onLine) {
        showFeedback('❌ Cannot delete while offline.', 'error', 3000);
        return;
      }

      try {
        await database.ref('drawings/' + drawingId).remove();

        // Remove from DOM
        const drawingItem = document.querySelector(`[data-drawing-id="${drawingId}"]`);
        if (drawingItem) {
          drawingItem.style.opacity = '0';
          drawingItem.style.transform = 'scale(0.9)';
          setTimeout(() => {
            drawingItem.remove();

            // Show "no drawings" message if gallery is now empty
            const gallery = document.getElementById('drawingsGallery');
            if (gallery.children.length === 0) {
              gallery.innerHTML = '<p class="no-drawings">No drawings saved yet</p>';
            }
          }, 300);
        }

        showFeedback('✓ Drawing deleted', 'success');
        console.log('Drawing deleted successfully');
      } catch (error) {
        console.error('Error deleting drawing:', error);
        showFeedback('❌ Error deleting drawing', 'error', 3000);
      }
    }

    // Scroll Animation - check if photos are in viewport
    function checkScrollAnimations() {
      const photoItems = document.querySelectorAll('.photo-item');

      photoItems.forEach(item => {
        const rect = item.getBoundingClientRect();
        const isVisible = rect.top < window.innerHeight * 0.8;

        if (isVisible && !item.classList.contains('visible')) {
          item.classList.add('visible');
        }
      });
    }

    window.addEventListener('scroll', checkScrollAnimations);
    window.addEventListener('load', checkScrollAnimations);

    // Drag and Drop Support
    const dropTarget = document.querySelector('.upload-section');

    // Prevent default drag behaviors on the whole page
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    // Highlight drop area when dragging over it
    ['dragenter', 'dragover'].forEach(eventName => {
      if (dropTarget) {
        dropTarget.addEventListener(eventName, () => {
          dropTarget.classList.add('drag-over');
        }, false);
      }
    });

    ['dragleave', 'drop'].forEach(eventName => {
      if (dropTarget) {
        dropTarget.addEventListener(eventName, () => {
          dropTarget.classList.remove('drag-over');
        }, false);
      }
    });

    // Handle dropped files
    if (dropTarget) {
      dropTarget.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        handleFiles(files);
      }, false);
    }

    // Handle pasted images (Cmd+V)
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData.items;
      const files = [];

      for (let item of items) {
        if (item.type.startsWith('image/')) {
          files.push(item.getAsFile());
        }
      }

      if (files.length > 0) {
        handleFiles(files);
      }
    });

    // Unified file handling function
    function handleFiles(filesInput) {
      const validFiles = Array.from(filesInput || []).filter((file) => file && file.type.startsWith('image/'));
      if (validFiles.length === 0) {
        showFeedback('❌ No valid images found. Please try again.', 'error', 4000);
        return;
      }

      processSelectedFiles(validFiles);
    }

    // Initialize canvas background
    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Register service worker for offline shell caching.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.min.js?v=2').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
