[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hehe"
version = "0.1.0"
description = "A Python project"
requires-python = ">=3.8"
dependencies = ["flake8", "pytest"]

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    ".eggs",
    "*.egg-info",
    "dist",
    "build"
]
per-file-ignores = [
    "__init__.py:F401"
]
