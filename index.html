<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories Together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap"
      rel="stylesheet">
  </noscript>
  <link rel="stylesheet" href="styles.min.css">
  <style>
    .photo-item {
      cursor: zoom-in;
    }

    .photo-item img {
      cursor: inherit;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(8, 10, 14, 0.92);
      backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      z-index: 10000;
    }

    .lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-content {
      position: relative;
      width: min(92vw, 1200px);
      max-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-image {
      display: block;
      max-width: 100%;
      max-height: 92vh;
      width: auto;
      height: auto;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow: 0 30px 120px rgba(0, 0, 0, .75);
      background: rgba(255, 255, 255, .03);
    }

    .lightbox-close {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 999px;
      background: rgba(18, 20, 26, .84);
      color: rgba(255, 255, 255, .92);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .lightbox {
        padding: 14px;
      }

      .lightbox-content {
        width: 100%;
      }

      .lightbox-close {
        top: 10px;
        right: 10px;
      }
    }

    .end-question {
      display: none;
      width: 100%;
      min-height: 100vh;
      padding: 0 20px;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, .98);
    }

    .end-question-text {
      display: block;
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(1.4rem, 3.2vw, 2rem);
      font-style: italic;
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1.35;
      text-wrap: balance;
    }

    .end-question.is-visible {
      display: flex;
      margin: 0;
    }

    .public-drawing-section {
      display: none;
      margin: 40px auto 48px;
      width: min(980px, 94vw);
    }

    .public-drawing-section.is-visible {
      display: block;
    }

    .public-drawing-toggle-wrap {
      display: flex;
      justify-content: center;
      margin: 10px 0 22px;
    }

    .public-drawing-toggle {
      border: 1px solid rgba(255, 255, 255, .18);
      background: rgba(255, 255, 255, .06);
      color: rgba(255, 255, 255, .92);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .02em;
      cursor: pointer;
      transition: all .2s ease;
    }

    .public-drawing-toggle:hover {
      background: rgba(255, 255, 255, .12);
      border-color: rgba(255, 255, 255, .28);
      transform: translateY(-1px);
    }

    .public-drawing-title {
      text-align: center;
      color: rgba(255, 255, 255, .92);
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(1.05rem, 2.2vw, 1.45rem);
      font-weight: 500;
      margin-bottom: 18px;
      letter-spacing: .02em;
    }

    .public-drawing-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .public-drawing-controls label {
      color: rgba(255, 255, 255, .78);
      font-size: .9rem;
    }

    .public-drawing-controls input[type="range"] {
      width: 110px;
    }

    .public-drawing-controls button {
      border: 1px solid rgba(255, 255, 255, .16);
      background: rgba(255, 255, 255, .06);
      color: rgba(255, 255, 255, .9);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s ease;
    }

    .public-drawing-controls button:hover {
      background: rgba(255, 255, 255, .12);
      border-color: rgba(255, 255, 255, .28);
    }

    .public-canvas-wrap {
      display: flex;
      justify-content: center;
    }

    #publicDrawingCanvas {
      width: min(920px, 94vw);
      height: min(560px, 62vw);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 16px;
      background: rgba(255, 255, 255, .03);
      box-shadow: 0 20px 70px rgba(0, 0, 0, .35);
      touch-action: none;
      cursor: crosshair;
    }

    @media (max-width: 768px) {
      .end-question {
        padding: 0 14px;
      }

      .end-question-text {
        max-width: 92vw;
        font-size: clamp(1.2rem, 6vw, 1.55rem);
        line-height: 1.4;
      }

      #publicDrawingCanvas {
        height: min(460px, 78vw);
      }
    }

    /* Lightbox Zoom */
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>
  <div class="container">
    <!-- Hero Section -->
    <section class="hero-section">
      <h1>Our Memories Together</h1>
      <div class="scroll-indicator">↓ SCROLL ↓</div>
    </section>

    <!-- Offline Banner -->
    <div id="offlineBanner"
      style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;padding:12px 20px;text-align:center;font-size:.85rem;letter-spacing:.05em;background:rgba(30,30,35,.95);border-bottom:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);backdrop-filter:blur(12px);">
      ⚡ You're offline — showing cached memories
    </div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" style="text-align:center;padding:40px;color:#888;font-size:1.2em;">Loading memories...
    </div>

    <div class="public-drawing-toggle-wrap">
      <button type="button" class="public-drawing-toggle" id="publicDrawingToggleBtn">Open Canvas</button>
    </div>

    <section class="public-drawing-section" id="publicDrawingSection" aria-label="drawing canvas">
      <h2 class="public-drawing-title">Draw me something sweet</h2>
      <div class="public-drawing-controls">
        <label for="publicColorPicker">Color</label>
        <input type="color" id="publicColorPicker" value="#ffffff">
        <label for="publicBrushSize">Size</label>
        <input type="range" id="publicBrushSize" min="1" max="42" value="5">
        <span id="publicBrushSizeValue" style="color:rgba(255,255,255,.75);font-size:.85rem;">5px</span>
        <button type="button" id="publicEraserBtn">Eraser</button>
        <button type="button" id="publicClearBtn">Clear</button>
      </div>
      <div class="public-canvas-wrap">
        <canvas id="publicDrawingCanvas" width="920" height="560"></canvas>
      </div>
    </section>

    <!-- Photos Gallery -->
    <div class="photos-gallery" id="photosGallery">
      <!-- Photos will be loaded here from Firebase -->
    </div>

    <section class="end-question" id="endQuestion" aria-label="special question">
      <p class="end-question-text">Will you let me be your special one for the rest of your life ?</p>
    </section>

    <div class="lightbox" id="photoLightbox" aria-hidden="true">
      <div class="lightbox-content">
        <button class="lightbox-close" id="lightboxCloseBtn" type="button" aria-label="Close photo">×</button>
        <img class="lightbox-image" id="lightboxImage" alt="Expanded memory photo">
      </div>
    </div>
  </div>

  <script>
    let database = null;
    let currentLightboxImage = null;

    async function initializeFirebase() {
      const response = await fetch('/firebase-config.json', {
        credentials: 'same-origin',
        cache: 'no-store'
      });
      if (!response.ok) {
        throw new Error('Failed to load Firebase config');
      }
      const firebaseConfig = await response.json();
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      database = firebase.database();
    }

    // Photo loading state
    let allPhotos = [];
    let photosLoaded = 0;
    const PHOTOS_PER_PAGE = 10;
    let loading = false;
    let photosFromCache = false;

    /**
     * Try to load cached photos from localStorage.
     */
    function loadCachedPhotos() {
      const cached = localStorage.getItem("cachedPhotos");
      if (cached) {
        try {
          allPhotos = JSON.parse(cached);
          photosLoaded = 0;
          photosFromCache = true;
          renderPhotos();
        } catch (e) {
          localStorage.removeItem("cachedPhotos");
        }
      }
    }

    /**
     * Load photos from Firebase and cache them. Falls back to cache on network failure.
     */
    async function fetchPhotos() {
      if (!database) return;
      const loadingIndicator = document.getElementById("loadingIndicator");
      if (!photosFromCache) {
        loadingIndicator.style.display = "block";
      }
      try {
        const photosSnapshot = await database.ref("photos").once("value");
        let photoOrder = "newest";
        try {
          const settingSnap = await database.ref("settings/photoOrder").once("value");
          photoOrder = settingSnap.val() || "newest";
        } catch (settingError) {
          console.warn("Photo order setting unavailable, using default order:", settingError);
        }
        const photos = photosSnapshot.val();
        if (!photos || Object.keys(photos).length === 0) {
          loadingIndicator.textContent = allPhotos.length === 0 ? "No memories added yet..." : "";
          loadingIndicator.style.display = allPhotos.length === 0 ? "block" : "none";
          updateEndQuestionVisibility();
          return;
        }
        const freshPhotos = Object.values(photos).sort((a, b) =>
          photoOrder === "newest" ? (b.timestamp || 0) - (a.timestamp || 0) : (a.timestamp || 0) - (b.timestamp || 0)
        );
        // Only update if different from cache
        if (JSON.stringify(freshPhotos) !== JSON.stringify(allPhotos)) {
          allPhotos = freshPhotos;
          localStorage.setItem("cachedPhotos", JSON.stringify(allPhotos));
          // Clear gallery and reload
          const photosGallery = document.getElementById("photosGallery");
          photosGallery.innerHTML = "";
          photosLoaded = 0;
          loadingIndicator.style.display = "none";
          renderPhotos();
        } else {
          loadingIndicator.style.display = "none";
        }
      } catch (error) {
        console.error("Error loading photos:", error);
        if (allPhotos.length > 0) {
          // Cached photos already displayed, just hide the loader
          loadingIndicator.style.display = "none";
        } else {
          loadingIndicator.textContent = navigator.onLine
            ? "Error loading memories. Please try again."
            : "You're offline — no cached memories available.";
        }
      }
    }

    /**
     * Update the offline banner visibility based on network status.
     */
    function updateOfflineBanner() {
      const banner = document.getElementById("offlineBanner");
      if (!navigator.onLine) {
        banner.style.display = "block";
        document.body.style.paddingTop = "44px";
      } else {
        banner.style.display = "none";
        document.body.style.paddingTop = "";
        // Refresh photos when back online
        fetchPhotos();
      }
    }

    window.addEventListener("online", updateOfflineBanner);
    window.addEventListener("offline", updateOfflineBanner);

    /**
     * Render photos with infinite scroll.
     */
    function renderPhotos() {
      const photosGallery = document.getElementById("photosGallery");
      const loadingIndicator = document.getElementById("loadingIndicator");
      let nextPhotos = allPhotos.slice(photosLoaded, photosLoaded + PHOTOS_PER_PAGE);
      nextPhotos.forEach((photo, index) => {
        const photoItem = document.createElement("div");
        photoItem.className = "photo-item";
        photoItem.tabIndex = 0;
        photoItem.setAttribute("role", "button");
        photoItem.setAttribute("aria-label", "Open memory photo");
        const openPhoto = () => openLightbox(photo.url);
        photoItem.addEventListener("click", openPhoto);
        photoItem.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openPhoto();
          }
        });
        const img = document.createElement("img");
        img.src = photo.url;
        img.alt = "Memory";
        img.loading = "lazy";
        img.decoding = "async";
        // Hide loading indicator when first image loads
        if (photosLoaded + index === 0) {
          img.onload = () => {
            loadingIndicator.style.display = "none";
          };
        }
        photoItem.appendChild(img);

        // Add photo metadata if available (hover to see caption)
        if (photo.caption) {
          const caption = document.createElement("div");
          caption.className = "photo-caption";
          caption.textContent = photo.caption;
          caption.style.pointerEvents = "none";
          photoItem.appendChild(caption);
        }

        photosGallery.appendChild(photoItem);
      });
      photosLoaded += nextPhotos.length;
      updateEndQuestionVisibility();
      setTimeout(() => checkScrollAnimations(), 100);
    }

    function updateEndQuestionVisibility() {
      const endQuestion = document.getElementById('endQuestion');
      if (!endQuestion) return;
      const shouldShow = allPhotos.length > 0 && photosLoaded >= allPhotos.length;
      const wasHidden = !endQuestion.classList.contains('is-visible');
      endQuestion.classList.toggle('is-visible', shouldShow);
      if (shouldShow && wasHidden) {
        setTimeout(() => {
          endQuestion.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 50);
      }
    }

    function initializePublicDrawingCanvas() {
      const canvas = document.getElementById('publicDrawingCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const colorPicker = document.getElementById('publicColorPicker');
      const brushSizeInput = document.getElementById('publicBrushSize');
      const brushSizeValue = document.getElementById('publicBrushSizeValue');
      const eraserBtn = document.getElementById('publicEraserBtn');
      const clearBtn = document.getElementById('publicClearBtn');

      let isDrawing = false;
      let brushSize = Number(brushSizeInput.value);
      let currentColor = colorPicker.value;
      let isEraser = false;

      function getPosition(event) {
        const rect = canvas.getBoundingClientRect();
        const point = event.touches ? event.touches[0] : event;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (point.clientX - rect.left) * scaleX,
          y: (point.clientY - rect.top) * scaleY
        };
      }

      function startDrawing(event) {
        isDrawing = true;
        const pos = getPosition(event);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
      }

      function draw(event) {
        if (!isDrawing) return;
        const pos = getPosition(event);
        ctx.lineWidth = brushSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = isEraser ? 'rgba(255, 255, 255, 0.03)' : currentColor;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
      }

      function stopDrawing() {
        if (!isDrawing) return;
        isDrawing = false;
        ctx.beginPath();
      }

      colorPicker.addEventListener('input', () => {
        currentColor = colorPicker.value;
        isEraser = false;
      });

      brushSizeInput.addEventListener('input', () => {
        brushSize = Number(brushSizeInput.value);
        brushSizeValue.textContent = `${brushSize}px`;
      });

      eraserBtn.addEventListener('click', () => {
        isEraser = !isEraser;
        eraserBtn.textContent = isEraser ? 'Pen' : 'Eraser';
      });

      clearBtn.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      });

      canvas.addEventListener('mousedown', startDrawing);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDrawing);
      canvas.addEventListener('mouseleave', stopDrawing);

      canvas.addEventListener('touchstart', (event) => {
        event.preventDefault();
        startDrawing(event);
      }, { passive: false });

      canvas.addEventListener('touchmove', (event) => {
        event.preventDefault();
        draw(event);
      }, { passive: false });

      canvas.addEventListener('touchend', (event) => {
        event.preventDefault();
        stopDrawing();
      }, { passive: false });
    }

    function initializePublicDrawingToggle() {
      const toggleBtn = document.getElementById('publicDrawingToggleBtn');
      const drawingSection = document.getElementById('publicDrawingSection');
      if (!toggleBtn || !drawingSection) return;

      toggleBtn.addEventListener('click', () => {
        const isVisible = drawingSection.classList.toggle('is-visible');
        toggleBtn.textContent = isVisible ? 'Hide Canvas' : 'Open Canvas';
      });
    }

    function openLightbox(imageUrl) {
      const lightbox = document.getElementById('photoLightbox');
      const lightboxImage = document.getElementById('lightboxImage');
      currentLightboxImage = imageUrl;
      lightboxImage.src = imageUrl;
      lightbox.classList.add('is-open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lightbox = document.getElementById('photoLightbox');
      const lightboxImage = document.getElementById('lightboxImage');
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.removeAttribute('src');
      currentLightboxImage = null;
      document.body.style.overflow = '';
    }

    function initializeLightbox() {
      const lightbox = document.getElementById('photoLightbox');
      const closeButton = document.getElementById('lightboxCloseBtn');

      closeButton.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && currentLightboxImage) {
          closeLightbox();
        }
      });
    }

    // Infinite scroll handler
    window.addEventListener('scroll', () => {
      if (loading) return;
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
        if (photosLoaded < allPhotos.length) {
          loading = true;
          renderPhotos();
          loading = false;
        }
      }
    });

    // Initial load
    window.addEventListener('load', async () => {
      initializeLightbox();
      initializePublicDrawingCanvas();
      initializePublicDrawingToggle();
      updateOfflineBanner();
      loadCachedPhotos();
      try {
        await initializeFirebase();
        fetchPhotos();
      } catch (error) {
        console.error('Firebase initialization failed:', error);
        const loadingIndicator = document.getElementById('loadingIndicator');
        loadingIndicator.textContent = 'Configuration error. Check Firebase env vars on server.';
        loadingIndicator.style.display = 'block';
      }
    });

    // Scroll Animation System
    function checkScrollAnimations() {
      const photoItems = document.querySelectorAll('.photo-item');
      const windowHeight = window.innerHeight;
      photoItems.forEach(item => {
        const rect = item.getBoundingClientRect();
        const itemTop = rect.top;
        if (itemTop < windowHeight * 0.7) {
          item.classList.add('visible');
        }
      });
    }
    window.addEventListener('scroll', checkScrollAnimations);
    window.addEventListener('resize', checkScrollAnimations);
    checkScrollAnimations();

    // Register service worker for offline shell caching.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.min.js?v=2').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
  <script src="music-player.min.js?v=2"></script>
  <!-- For production: Use Redis or similar server-side cache to store photo metadata and URLs for fast access. -->
</body>

</html>
